[project]
name = "economica-news"
version = "0.1.0"
description = "Clean post-wipe skeleton for Economica News."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "playwright>=1.52.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
]

[tool.setuptools]
packages = ["app", "app.discovery"]

[tool.pytest.ini_options]
testpaths = ["tests"]
