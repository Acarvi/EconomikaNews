name: CI

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  archive-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check reset archive
        run: |
          test -f README.md
          test -d _archive/essential_knowledge
          test -f _archive/essential_knowledge/02_publishing_contracts.md
          test -f _archive/essential_knowledge/03_instagram_meta_and_catbox_notes.md
          test -f _archive/essential_knowledge/09_open_questions_for_next_design_session.md

      - name: Secret scan
        shell: bash
        run: |
          PATTERN="AIz""a[0-9A-Za-z_-]{20,}|xo""xb-|gh""p_|gh""o_|GEMINI""_API_KEY=AIz""a|OPENROUTER""_API_KEY=.*[^_here]"
          if git grep -n -E "$PATTERN" -- . ':!*.md' ':!.env.example'; then
            echo "Potential secret found"
            exit 1
          fi
